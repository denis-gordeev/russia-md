name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    # Selective upstream sync: keep a hard ceiling on deploy builds so a stuck
    # install/build step fails fast instead of burning the default 6-hour limit.
    timeout-minutes: 60
    env:
      NODE_OPTIONS: --max-old-space-size=12288
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
      - name: Validate skills and markdown links
        run: npm run check:skills
      - name: Validate skill fixtures
        run: npm run check:skills:fixtures
      - name: Validate content frontmatter
        env:
          CONTENT_DIFF_BASE: ${{ github.event.before }}
        run: npm run test:content:ci
      - name: Build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
