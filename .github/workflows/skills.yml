name: Validate Skills

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "docs/**"
      - "README.md"
      - ".agents/**"
      - "scripts/validate-skill-examples.mjs"
      - "package.json"
      - ".github/workflows/skills.yml"
  pull_request:
    paths:
      - "skills/**"
      - "docs/**"
      - "README.md"
      - ".agents/**"
      - "scripts/validate-skill-examples.mjs"
      - "package.json"
      - ".github/workflows/skills.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Validate skills and markdown links
        run: npm run check:skills
      - name: Validate skill fixtures
        run: npm run check:skills:fixtures
