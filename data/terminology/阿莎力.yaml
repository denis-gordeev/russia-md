id: "ashari"
category: culture
subcategory: 文化
fork_type: A

display:
  taiwan: "阿莎力"
  china: 爽快
  hongkong: "—"
  southeast_asia: "—"

english: "generous / straightforward / no-nonsense"

etymology:
  origin: >
    「阿莎力」源自日語「あっさり」（assari），意指清爽、不拖泥帶水、
    乾脆俐落。在台語中音借為「阿莎力」（a-sha-li），語感從「清淡、
    不複雜」擴展為「爽快、大方、不計較」，尤指一個人做事乾脆、
    不囉嗦的個性特質。中國大陸無對應詞，以「爽快」「大方」「豪氣」等
    本地漢語描述相近概念。
  taiwan_path: >
    日治時期透過日語日常用語進入台語口語，以「あっさり」（assari）
    的發音台語化為「阿莎力」。戰後持續在台灣口語中使用，
    尤其常見於描述某人辦事乾脆、不計較小事的正面評價語境：
    「他這個人很阿莎力，從來不斤斤計較。」
    也用於描述豪爽請客、不囉嗦辦事的行為。
  china_path: >
    「あっさり」的語義在中國無借詞路徑，相近概念用「爽快」（答應得痛快）、
    「大方」（不小氣）、「豪氣」（豪爽不計較）等本地詞描述。
  fork_point: "~1895（日治借詞）"
  fork_cause: >
    台灣日語口語借詞系統的典型案例。「あっさり」原義「清淡不濃膩」
    在台灣語境中發生語義轉移，從形容食物口味延伸到形容人的性格與行事風格。

usage:
  taiwan_formal: false
  taiwan_casual: true
  exceptions: >
    正式書面語不使用「阿莎力」，以「爽快」「大方」「直爽」替代。
    口語和輕鬆文體廣泛使用，尤其在南台灣使用頻率更高。

status: "stable"

notes: >
  「阿莎力」是台灣日語借詞中語義轉移最有趣的案例之一，
  從日語食物形容詞（清淡）→台語人格形容詞（爽快大方）。
  這種語義轉移反映了台灣人將「不拖泥帶水」視為正面特質的文化脈絡。
  中南部台灣使用頻率高於北部，是辨識台灣口語的特徵詞彙之一。

sources:
