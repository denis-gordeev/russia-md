id: 真香
category: daily
fork_type: E
display:
  taiwan: 真棒 / 蒸蚌 / 有夠讚 / 被打臉 / 嘴巴說不要，身體卻很誠實
  china: 真香
etymology:
  origin: 源自2014年《變形計》節目，王境澤說「我就算餓死也不吃你們的東西」後大快朵頤說「真香」。指態度反轉、被打臉。台灣可對應「嘴巴說不要，身體很誠實」。
notes: 來源：caris-events/invade (CC0)
sources:
