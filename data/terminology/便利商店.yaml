  taiwan_casual: true
  exceptions: "台灣口語有時直說品牌名（7-11、全家）"

status: stable
notes: 台灣便利商店密度（每2300人一家）為全球最高，是台灣都市生活的核心。便利商店可繳費、取貨、影印、ATM、代收等，功能遠超中國「便利店」概念。

