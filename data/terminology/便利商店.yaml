  origin: convenience store 的意譯。台灣採完整「便利商店」；中國/香港縮略為「便利店」
  taiwan_path: 台灣「便利商店」（7-ELEVEN、全家、萊爾富、OK）文化密度全球最高，24小時、各種服務全覆蓋
  china_path: 中國「便利店」文化發展較晚，服務項目和密度相對有限
  fork_point: "~1980s"
  fork_cause: 台灣便利商店文化高度發展，「便利商店」成為台灣社會基礎設施

