id: ba-mian
category: legal
subcategory: 政治與法律
fork_type: B

display:
  taiwan: 罷免
  china: 罢免
english: recall (of elected official)

etymology:
  origin: 「罷免」指通過選民投票撤除民選官員職務，兩岸用詞相同（繁簡字差異），但台灣罷免制度在民主政治中有實質運作。
  taiwan_path: 台灣罷免制度在2016年後門檻大幅降低，2021年罷免高雄市長韓國瑜（成功）和多位立委、議員，「罷免投票」成為台灣民主政治的新常態。
  china_path: 中國名義上有罷免程序，但實際上罷免民選官員的案例極為罕見，不具有台灣式的直接民主意義。
  fork_point: "~1994"
  fork_cause: 台灣罷免制度有實質的民主功能，是台灣直接民主機制的重要組成。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  台灣罷免案的頻繁發生是台灣直接民主成熟化的表現，也是台灣政治兩極化的縮影，「罷免」一詞在台灣已承載高度的政治動員意涵。

sources:
  - "公職人員選罷法（台灣）及中央選舉委員會罷免統計"

added: "2026-03-30"
updated: "2026-03-30"
