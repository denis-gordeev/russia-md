id: tanzania
category: culture
subcategory: 國名與地名
fork_type: B
display:
  taiwan: 坦尚尼亞
  china: 坦桑尼亞
  hongkong: 坦桑尼亞
english: Tanzania
etymology:
  origin: Tanzania 的音譯。「尚」（shàng）vs「桑」（sāng）為 zan 音節的不同漢字選擇
  taiwan_path: 台灣採「坦尚尼亞」，為外交部官方音譯規範
  china_path: 中國採「坦桑尼亞」，中華人民共和國外交部標準音譯，「桑」更接近 zan 的音
  fork_point: ~1961s
  fork_cause: 坦尚尼亞1961年獨立後，兩岸各自制定音譯規範，選字不同
usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""
status: stable
notes: 這是兩岸非洲國家名稱音譯差異的典型例子。台灣外交部對非洲國名有完整的音譯對照表，與中國多有差異。
sources:
  - 《大陸用語檢索手冊》（1997）
  - 台灣外交部國家/地區名稱對照表
added: 2026-03-29
updated: 2026-03-29
