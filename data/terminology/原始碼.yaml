id: source_code
category: tech
fork_type: B

display:
  taiwan: 原始碼
  china: 源代碼
  hongkong: 原始碼

english: source code

etymology:
  origin: source code 的意譯。「原始」強調最初/原本的程式碼；「源代碼」拆解為源頭+代碼
  taiwan_path: 台灣採「原始碼」，與「程式碼（code）」詞彙系統一致
  china_path: 中國採「源代碼」，「代碼（code）」為中國 IT 術語，延伸出「源代碼」
  fork_point: "~1990s"
  fork_cause: 「code」的翻譯分歧（台灣：碼；中國：代碼）

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: 這是「碼」vs「代碼」翻譯路線的延伸差異。台灣 IT 文件、GitHub 繁中介面均用「原始碼」，中國 Git 平台（Gitee 等）用「源代碼」。

sources:
  - "藍光濾波研究所 C2T 詞庫"
  - "ThunderKO C2T 詞庫"

