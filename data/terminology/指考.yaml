id: college_entrance_exam_tw2
category: education
fork_type: B

display:
  taiwan: 指考
  china: 高考
  hongkong: DSE

english: college entrance examination - Taiwan advanced level

etymology:
  origin: 「指考」為「指定科目考試」縮略，台灣大學入學第二管道；現已廢止（2022年後），改稱「分科測驗」
  taiwan_path: 台灣指考（現改名分科測驗）於7月舉行，為學測之後的第二次考試機會
  china_path: 中國「高考」為唯一全國統一考試，無類似多軌制度
  fork_point: "~1994s"
  fork_cause: 台灣多元入學改革創設雙軌制，2022年後指考更名為「分科測驗」

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: "2022年後正式名稱改為『分科測驗』，但民間仍習慣說『指考』"

status: evolving
notes: 「指考」已於2022年廢止，改稱「分科測驗」，但口語「指考」仍大量流通。與「學測」共同構成台灣獨特的大學雙軌考試文化。

sources:
  - "台灣大學入學考試中心（CEEC）"

