id: 內卷
category: daily
fork_type: E
display:
  taiwan: 過度競爭 / 內鬥 / 內耗
  china: 內卷
etymology:
  origin: 「involution」的中文翻譯，原為人類學術語。2020年後成為中國最熱門流行語，形容無意義的過度競爭（如職場無止境加班）。台灣對應「過度競爭」或「內耗」，但「內卷」一詞在台灣年輕族群中也開始流通。
notes: 來源：caris-events/invade (CC0)
sources:
  - https://github.com/caris-events/invade
added: 2026-03-30
