id: planning_proposal
category: business
fork_type: B

display:
  taiwan: 企劃
  china: 策劃
  hongkong: 企劃

english: planning / proposal / project planning

etymology:
  origin: 「企劃」為日語「企画（きかく）」直接借用；「策劃」為中文固有詞（策略籌劃）
  taiwan_path: 台灣沿用日語漢字「企劃」，廣告業、媒體業、活動業均採用
  china_path: 中國採「策劃」，「策劃案」「策劃書」為標準商業文件名稱
  fork_point: "~1950s"
  fork_cause: 日語遺產（台灣企劃）+ 中國自行詞彙規範

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: 「企劃師」vs「策劃師」、「企劃書」vs「策劃書」，是廣告創意業兩岸文件往來時的常見對照。

sources:
  - "ThunderKO C2T 詞庫"
  - "《大陸用語檢索手冊》（1997）"

