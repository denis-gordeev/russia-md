  taiwan_formal: false
  taiwan_casual: true
  exceptions: ""

status: stable
notes: 「懶人包」是台灣媒體生態的特色詞，《天下》《商業週刊》等主流媒體也大量使用。中國人聽到「懶人包」會理解含義但不這樣說。

