etymology:
  origin: 「懶人包」為台灣網路造語（懶人用的資訊包），直覺幽默；中國「科普文」強調科學普及
  taiwan_path: 台灣 PTT/媒體圈發展出「懶人包」，指濃縮重點、方便快速閱讀的整理文章
  china_path: 中國以「科普文」為主，有時用「乾貨」（有料的乾硬知識內容）
  fork_point: "~2010s"
  fork_cause: 台灣網路幽默命名文化 vs 中國知識普及強調路線

