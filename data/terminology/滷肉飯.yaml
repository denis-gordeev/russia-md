id: braised_pork_rice
category: culture
fork_type: D

display:
  taiwan: 滷肉飯
  china: 滷肉飯
  hongkong: 滷肉飯

english: braised pork rice (Taiwanese lu rou fan)

etymology:
  origin: 「滷肉飯」兩岸字形相同，但台灣的滷肉飯（lu rou fan）是特定的台灣小吃，風味和做法在中國無直接對應
  taiwan_path: 台灣滷肉飯以五花肉碎丁滷汁為特色，是台灣國民小吃，各家口味略有差異，南部稱「肉燥飯」
  china_path: 中國有滷肉飯做法，但非代表性食物，且做法、風味與台灣版本完全不同
  fork_point: "~1950s"
  fork_cause: 台灣戰後眷村飲食文化與閩南飲食文化融合，形成台灣獨特小吃

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: "台灣南部說『肉燥飯』，北部說『滷肉飯』，指同一道菜"

status: stable
notes: 滷肉飯是台灣的「國民美食」，《米其林指南》台灣版必列，是台灣飲食文化認同的核心象徵之一。英文拼音 lu rou fan 已成國際通用。

sources:
  - "台灣觀光局飲食文化資料"

