id: jiche
category: daily
subcategory: 公路交通
fork_type: D
display:
  taiwan: 機車
  china: 摩托車
  hongkong: 電單車 / 摩托車
  southeast_asia: 摩托車 / 機車
english: motorcycle / scooter / motorbike
etymology:
  origin: >
    「機車」在台灣有兩個來源層次：其一是日治時期的「機械車輛」縮略， 日文「機動車」（きどうしゃ）在台灣口語中演化為「機車」， 與日文「自動車」（汽車）相對。 其二是台語底層：台語「機車」（ki-tshia）至今仍指機踏車、摩托車，
    發音保留日語借詞特徵。「摩托車」則是英文「motor」的音譯， 中國大陸1949年後採用的標準譯法。
  taiwan_path: >
    日治時期（1895-1945）台灣就有機動車輛，台語口語稱「機車」。 光復後國語「機車」沿用並固化。台灣是全球機車密度最高的地區之一， 「騎機車」「機車族」「機車行」等衍生詞大量存在。
    現代台灣口語「機車」也作形容詞用，表示「麻煩、難搞、不講理」， 是獨特的台灣語義演化，中國大陸無此用法。
  china_path: |
    1949年後中國採用蘇聯技術標準，「摩托車」成為官方譯名 （俄文мотоциклет也是英文motor的音譯路徑）。 2000年代電動自行車普及後，「電動車」成為新興類別， 摩托車（有引擎）與電動車（電池）在中國有嚴格區分。
  fork_point: ~1895（日治底層）/ ~1949（政治分治後固化）
  fork_cause: |
    日語借詞底層加上政治分治後兩岸各自發展的語言規範， 形成了截然不同的用詞體系。台灣「機車」保留日語遺產， 中國「摩托車」是英語直接音譯。
usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: |
    台灣法規文件有時使用「機器腳踏車」（全稱），口語一律「機車」。 形容詞義「機車」（難搞）僅在台灣口語，正式文章不使用此義。
status: stable
notes: >
  台灣機車登記數量超過1,400萬輛，是每千人機車持有量全球前列的地區。 「機車」一詞反映了台灣社會與機車深刻的日常生活連結， 也是日語遺產保留最典型的交通詞彙之一。 形容詞「機車」（例：「他這個人很機車」）是台灣特有的語義擴展，
  源自機車（摩托車）給行人帶來的干擾感，此義在台灣年輕世代廣泛使用。
