etymology:
  origin: 螢幕上顯示目前位置的指標。台灣稱「游標」（游動的標記），中國稱「光標」（光的標記）。「遊標」為異體字寫法，正寫為「游標」。
  taiwan_path: 台灣用法
  china_path: 中國用法
  fork_point: ""
notes: 「遊標」為「游標」異體字，統一為「游標」
sources:
