id: down-to-earth
taiwan: 親民 / 接地氣
china: 接地氣
type: E
category: daily
origin: 中國「接地氣」指貼近大眾，台灣說「親民」「接地氣」（已部分滲入）。
taiwan_path: 台灣傳統說「親民」「貼近民眾」「很 local」，近年「接地氣」有滲入趨勢。
china_path: 中國「接地氣」是政治+日常高頻詞：「這個政策很接地氣」「接地氣的內容」。
fork_cause: 中國政治語境造詞，透過網路滲入台灣。
notes: |
  「接地氣」是滲入台灣最成功的中國用語之一，連政治人物都開始用。但較年長的台灣人仍說「親民」。
