id: "obasang"
category: culture
subcategory: 文化
fork_type: A

display:
  taiwan: "歐巴桑"
  china: 大媽
  hongkong: "師奶 / 大媽"
  southeast_asia: "—"

english: "middle-aged / elderly woman (colloquial)"

etymology:
  origin: >
    「歐巴桑」源自日語「おばさん」（obasan），意指中年婦女或阿姨，
    是比「おばあさん」（obaasan，老婆婆）年輕一層的稱呼。
    台語也有保留此詞：台語「阿婆仔」（a-pô-á）和「歐巴桑」並行，
    前者偏長輩尊稱，後者偏中性或略帶調侃。
    「大媽」是中國大陸近年興起的口語，有時帶有特定文化刻板印象意味。
  taiwan_path: >
    日治時期台灣民間廣泛使用日語「おばさん」，光復後以漢字音譯「歐巴桑」
    固定下來。在台灣，「歐巴桑」語感中性偏親暱，常帶自嘲意味
    （如女性說「我已經變成歐巴桑了」），沒有特別負面的刻板印象。
    是台灣最常見的日語借詞之一，橫跨世代廣泛使用。
  china_path: >
    中國沒有「歐巴桑」的對應詞，依年齡/關係稱「阿姨」「大嬸」「大媽」。
    「大媽」2010年代在中國網路語境中獲得特定意涵（廣場舞大媽、
    搶黃金的大媽等），語感帶有刻板印象，與台灣「歐巴桑」的中性語感不同。
  fork_point: "~1895（日治借詞）"
  fork_cause: >
    日本殖民統治帶來的日語親屬/稱謂詞彙系統，
    「おばさん」是台灣接受最廣泛的日語稱謂借詞之一。

usage:
  taiwan_formal: false
  taiwan_casual: true
  exceptions: >
    正式文章（如新聞報導）較少使用「歐巴桑」，多用「婦女」「女性」或
    依年齡描述。口語、社群媒體、輕鬆文體廣泛使用。

status: "stable"

notes: >
  對應的男性稱呼是「歐吉桑」（おじさん，ojisan），同樣是台灣常用日語借詞。
  「歐巴桑」在台灣語感上是中性甚至親切的，而中國「大媽」在某些語境帶有
  較強的刻板印象，兩者文化語感差異值得注意。

sources:
