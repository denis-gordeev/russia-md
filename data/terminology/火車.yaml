id: train
category: transport
fork_type: F

display:
  taiwan: 火車
  china: 火車
  hongkong: 火車

english: train

etymology:
  origin: 「火車」為蒸汽時代的命名，兩岸均沿用，但台灣「火車」文化特指台鐵（TRA）系統
  taiwan_path: 台灣「火車」特指台灣鐵路管理局（台鐵）列車，帶有台鐵文化認同（便當、懷舊感）
  china_path: 中國「火車」泛指普通鐵路列車，相對於「高鐵」；買票叫「買火車票」
  fork_point: "~1950s"
  fork_cause: 台灣台鐵系統保留特定文化形象；中國鐵路系統更為龐大複雜

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: "台灣新一代說『搭台鐵』以區別高鐵，但民間「火車」仍通用"

status: stable
notes: 台灣「火車便當」（池上便當等）是台鐵文化的象徵，完全沒有對應的中國語境。「火車站」在台灣特指台鐵車站，不包含高鐵站。

sources:
  - "台灣鐵路管理局（TRA）"

