id: presentation
category: business
fork_type: B

display:
  taiwan: 簡報
  china: PPT
  hongkong: 簡報

english: presentation / slideshow

etymology:
  origin: 「簡報」為 briefing/presentation 的意譯；中國以「PPT」（PowerPoint）直接代稱所有簡報
  taiwan_path: 台灣採「簡報」作為名詞（做簡報、簡報軟體），PPT 僅指微軟特定格式
  china_path: 中國以「PPT」通指所有投影片簡報，不管用什麼軟體製作，「做 PPT」等於「做簡報」
  fork_point: "~2000s"
  fork_cause: 中國辦公室文化品牌名詞化 + 台灣保持功能性描述

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: "台灣說『上傳 PPT 檔』指 PowerPoint 格式的檔案"

status: stable
notes: 「幫我做一份 PPT」在中國是正常工作指令；在台灣同事可能會說「幫我做簡報」。品牌名稱泛化（PPT = 所有簡報）是中國商業用語特色。

sources:
  - "ThunderKO C2T 詞庫"
  - "《大陸用語檢索手冊》（1997）"

added: "2026-03-29"
updated: "2026-03-29"
