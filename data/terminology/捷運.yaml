id: jieyun
category: daily
subcategory: 大眾運輸
fork_type: B
display:
  taiwan: 捷運
  china: 地鐵
  hongkong: 港鐵 / 地鐵
  southeast_asia: 地鐵 / MRT
english: MRT / metro / subway
etymology:
  origin: >
    「捷運」是台灣官方為台北大眾捷運系統制定的本地化名稱，取「快捷運輸」 之意，全稱「大眾捷運系統」（Mass Rapid Transit，MRT）。 「地鐵」則是「地下鐵路」的縮略，是中國大陸的通用稱呼，
    最早見於上海1956年地下鐵道規劃文件，後成為全國標準。
  taiwan_path: >
    1977年台北市開始規劃大眾運輸系統，官方正式定名「大眾捷運系統」， 英文縮寫MRT。1996年木柵線通車，正式啟用「捷運」名稱。 此後各縣市陸續建設的軌道系統（台中捷運、高雄捷運等）均沿用「捷運」。
    捷運一詞在台灣已完全固化，指所有地面、地下、高架的都市軌道系統。
  china_path: |
    中國第一條地鐵1969年在北京通車，官方稱「地下鐵道」，日常縮稱「地鐵」。 2000年代以後各大城市快速建設地鐵，「地鐵」成為絕對主流用語。 部分城市官方也用「軌道交通」作為更廣義的統稱。
  fork_point: ~1977
  fork_cause: |
    台灣在規劃時選擇制定本地化名稱「捷運」而非沿用「地鐵」， 一方面是因為台北捷運系統有大量高架路段（並非全在地下）， 另一方面反映台灣官方語言政策傾向自製詞彙。
usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: |
    台灣人討論外國都市鐵路時可能使用「地鐵」（如「東京地鐵」「倫敦地鐵」）， 但描述台灣本地系統一律用「捷運」。 「輕軌」在台灣指較低規格的輕軌系統（如高雄輕軌），與「捷運」有區別。
status: stable
notes: |
  捷運是台灣辨識度最高的在地用語之一，台北捷運公司（TRTC）、 高雄捷運公司（KRTCO）等官方命名均使用「捷運」。 「地鐵」在台灣媒體中幾乎只出現在描述中國、香港、日本等外國城市時。
