id: print
category: tech
fork_type: B

display:
  taiwan: 列印
  china: 打印
  hongkong: 打印

english: to print (document)

etymology:
  origin: 「列印」為日語「印刷（いんさつ）」+ 列表輸出概念的組合；「打印」為英語 print 的音義混合譯法
  taiwan_path: 台灣以「列印」為電腦打印機輸出的標準用詞，見於 Windows 系統中文化介面（台灣版）
  china_path: 中國以「打印」為標準，打印機（printer），打印店（copy shop）
  fork_point: "~1990s"
  fork_cause: 電腦本地化翻譯策略差異，台灣參考日語用詞

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: "台灣一般消費者口語有時也說『印一下』而非『列印』"

status: stable
notes: Windows 與 macOS 台灣繁體版均採「列印」，中文簡體版用「打印」。這是作業系統界面最明顯的兩岸差異之一。

sources:
  - "藍光濾波研究所 C2T 詞庫"
  - "Microsoft Windows 繁體中文界面"

added: "2026-03-29"
updated: "2026-03-29"
