  origin: 「高鐵」為「高速鐵路」縮略，兩岸均使用，但指涉的鐵路系統完全不同
  taiwan_path: 台灣高鐵（THSR）為日本新幹線技術，2007年通車，營運台北至左營，為獨立公司
  china_path: 中國高鐵為全球最大高鐵網路（4萬公里+），採自主研發技術，覆蓋全國
  fork_point: "~2007s"
  fork_cause: 兩岸各自建設高速鐵路系統，採用不同技術路線

