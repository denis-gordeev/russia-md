display:
  taiwan: 布袋戲
  china: 布袋戲（木偶劇）
  hongkong: 布袋戲

english: Taiwanese glove puppetry (Budaixi)

etymology:
  origin: 「布袋戲」（Budaixi）為閩南語傳統布偶戲，表演者將手插入布偶中操作
  taiwan_path: 台灣布袋戲從傳統廟口演出發展出電視布袋戲（1970年代）、金光布袋戲等，「霹靂布袋戲」更成為流行文化現象
  china_path: 中國閩南地區有同類傳統，但商業化程度遠不及台灣，未形成影視娛樂工業
  fork_point: "~1960s"
  fork_cause: 台灣電視媒體帶動布袋戲商業化發展，形成獨特的影視娛樂生態

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: 台灣布袋戲（尤其霹靂系列）已發展為完整的影視娛樂產業，有電視台、OTT、漫畫、周邊商品，是台灣文化輸出的代表之一。

sources:
  - "文化部無形文化資產資料庫：布袋戲"
  - "霹靂國際多媒體股份有限公司"

